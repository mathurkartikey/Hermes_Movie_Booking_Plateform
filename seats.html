<!DOCTYPE html>
<html>
<head>
  <title>Select Seats</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar" onclick="go('index.html')">
  🎬 Hermes
</div>

<button class="back-btn" onclick="goBack()">⬅ Back</button>

<h2>Select Seats</h2>

<!-- SHOW INFO -->
<p id="showInfo"></p>

<!-- SEAT GRID -->
<div class="seat-grid" id="seats"></div>

<!-- LIVE USERS -->
<p id="liveUsers" style="margin-top:10px; color:#00bfff;">
  👀 Checking who else is watching...
</p>

<!-- SELECTION INFO -->
<p>Selected Seats: <span id="selectedSeats">None</span></p>
<p>Total Price: ₹<span id="totalPrice">0</span></p>

<button onclick="go('payment.html')">
  Proceed to Payment 💳
</button>

<script src="script.js"></script>

<script>
/* ===== SHOW INFO ===== */
const theatre = localStorage.getItem("theatre");
const time = localStorage.getItem("time");

if (theatre && time) {
  document.getElementById("showInfo").innerText =
    theatre + " - " + time;
}

/* ===== SEAT LOGIC ===== */
let selectedSeats = [];
const price = 150;

const container = document.getElementById("seats");

/* Generate seats A1–A30 */
for (let i = 1; i <= 30; i++) {
  let seat = document.createElement("div");
  seat.className = "seat";
  seat.innerText = "A" + i;

  seat.onclick = () => {
    seat.classList.toggle("selected");

    const seatNo = seat.innerText;

    if (selectedSeats.includes(seatNo)) {
      selectedSeats = selectedSeats.filter(s => s !== seatNo);
    } else {
      selectedSeats.push(seatNo);
    }

    // Update UI
    document.getElementById("selectedSeats").innerText =
      selectedSeats.length ? selectedSeats.join(", ") : "None";

    document.getElementById("totalPrice").innerText =
      selectedSeats.length * price;

    // ✅ SAVE TO LOCALSTORAGE (IMPORTANT)
    localStorage.setItem("selectedSeats", selectedSeats.join(", "));
    localStorage.setItem("totalPrice", selectedSeats.length * price);
  };

  container.appendChild(seat);
}

/* ===== LIVE USERS FEATURE ===== */
setInterval(() => {
  const count = Math.floor(Math.random() * 5) + 1;

  const msgs = [
    `👀 ${count} people also booking`,
    `🔥 ${count} users active`,
    `🎬 ${count} movie lovers nearby`,
    `⚡ Seats filling fast! ${count}`
  ];

  document.getElementById("liveUsers").innerText =
    msgs[Math.floor(Math.random() * msgs.length)];
}, 3000);
</script>

</body>
</html>
